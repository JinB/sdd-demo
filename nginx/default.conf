# SSL cert at wp.4eng.online path is a SAN cert covering all three domains.
# Certbot include directives are added by Certbot on the live server.

server {
    listen 80;
    server_name wp.4eng.online;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name wp.4eng.online;

    ssl_certificate /etc/letsencrypt/live/wp.4eng.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wp.4eng.online/privkey.pem;

    location /media/ {
        alias /var/www/sdd-demo/media/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://localhost:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name astro.4eng.online;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name astro.4eng.online;

    ssl_certificate /etc/letsencrypt/live/wp.4eng.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wp.4eng.online/privkey.pem;

    root /var/www/sdd-demo/astro/dist;
    index index.html;

    location /media/ {
        alias /var/www/sdd-demo/media/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    server_name docu.4eng.online;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name docu.4eng.online;

    ssl_certificate /etc/letsencrypt/live/wp.4eng.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wp.4eng.online/privkey.pem;

    root /var/www/sdd-demo/docusaurus/build;
    index index.html;

    location /media/ {
        alias /var/www/sdd-demo/media/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
