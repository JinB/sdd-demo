name: Deploy on WordPress Post Change

on:
  repository_dispatch:
    types: [wordpress-post-change]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install OpenSpec dependencies
        run: pip install -r openspec/requirements.txt

      - name: Validate OpenSpec
        run: python openspec/validate.py

      - name: Fetch WordPress posts
        run: |
          curl -s "https://wp.4eng.online/wp-json/wp/v2/posts?per_page=100&page=1&_embed" \
            -o posts.json

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup SSH key
        env:
          DEPLOY_KEY: ${{ secrets.GH_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      # ── Astro ──────────────────────────────────────────────────────────────
      - name: Astro — install dependencies
        run: npm install
        working-directory: ./astro

      - name: Astro — generate content
        run: node scripts/generate-content.js

      - name: Astro — build
        run: npm run build
        working-directory: ./astro

      - name: Astro — deploy
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ubuntu@astro.4eng.online \
            "mkdir -p /var/www/sdd-demo/astro/dist"
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./astro/dist/ \
            ubuntu@astro.4eng.online:/var/www/sdd-demo/astro/dist/

      # ── Next.js ────────────────────────────────────────────────────────────
      - name: Next.js — install dependencies
        run: npm install
        working-directory: ./nextjs

      - name: Next.js — generate content
        run: node scripts/generate-nextjs-content.js

      - name: Next.js — build
        run: npm run build
        working-directory: ./nextjs

      - name: Next.js — deploy
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ubuntu@next.4eng.online \
            "mkdir -p /var/www/sdd-demo/nextjs/out"
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./nextjs/out/ \
            ubuntu@next.4eng.online:/var/www/sdd-demo/nextjs/out/

      # ── Docusaurus ─────────────────────────────────────────────────────────
      - name: Docusaurus — install dependencies
        run: npm install
        working-directory: ./docusaurus

      - name: Docusaurus — generate content
        run: node scripts/generate-docusaurus-content.js

      - name: Docusaurus — build
        run: npm run build
        working-directory: ./docusaurus

      - name: Docusaurus — deploy
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ubuntu@docu.4eng.online \
            "mkdir -p /var/www/sdd-demo/docusaurus/build"
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./docusaurus/build/ \
            ubuntu@docu.4eng.online:/var/www/sdd-demo/docusaurus/build/
