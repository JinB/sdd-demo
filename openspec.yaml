meta:
  name: sdd-demo
  version: "1.0"

infrastructure:
  provider: aws
  region: eu-central-1
  instance_type: t3.small
  os: ubuntu-24.04
  security_group:
    name: sg-spec-demo
    inbound:
      - { port: 22,  cidr: 0.0.0.0/0 }
      - { port: 80,  cidr: 0.0.0.0/0 }
      - { port: 443, cidr: 0.0.0.0/0 }
    outbound:
      - { port: all, cidr: 0.0.0.0/0 }
  iam:
    ec2_role: sdd-demo-ec2-role
    policies:
      - route53_update

secrets:
  store: aws-secrets-manager
  keys:
    - db_password
    - wp_admin_password
    - gh_deploy_key

services:
  wordpress:
    title: Eugenio WP
    image: wordpress:latest
    port: 8080
    domain: wp.4eng.online
    categories: [Sport, Travel, Uncategorized]

  mysql:
    image: mysql:8.0
    secret_ref: db_password

  astro:
    title: Eugenio Astro
    port: 4321
    domain: astro.4eng.online
    mode: ssg
    features:
      dark_light_switcher: true
      live_clock:
        format: HH:mm:ss
        timezone: Intl
    categories: [Sport, Travel, Uncategorized]

  docusaurus:
    title: Eugenio Docu
    port: 3000
    domain: docu.4eng.online
    mode: ssg
    build_output: build
    features:
      live_clock:
        format: HH:mm:ss
        timezone: Intl

  nextjs:
    title: Eugenio Next.js
    port: 3001
    domain: next.4eng.online
    mode: ssg
    build_output: out
    features:
      dark_light_switcher: true
      live_clock:
        format: HH:mm:ss
        timezone: Intl

routing:
  engine: nginx
  ssl: letsencrypt
  shared_media:
    host_path: /var/www/sdd-demo/media
    url_path: /media
  upstreams:
    - service: wordpress
      domain: wp.4eng.online
      proxy_port: 8080
    - service: astro
      domain: astro.4eng.online
      serve_static: /var/www/sdd-demo/astro/dist
    - service: docusaurus
      domain: docu.4eng.online
      serve_static: /var/www/sdd-demo/docusaurus/build
    - service: nextjs
      domain: next.4eng.online
      serve_static: /var/www/sdd-demo/nextjs/out

cicd:
  provider: github-actions
  trigger: wordpress-webhook
  steps:
    - fetch_posts:
        url: "https://wp.4eng.online/wp-json/wp/v2/posts"
        params: { per_page: 100, page: 1 }
    - build_astro:
        replaces: ./astro/src/content/blog
    - build_docusaurus:
        replaces: ./docusaurus/blog
    - deploy:
        method: rsync-ssh
        secret_ref: gh_deploy_key
